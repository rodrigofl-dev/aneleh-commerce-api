name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: aneleh_commerce_test
          MYSQL_USER: aneleh_app
          MYSQL_PASSWORD: aneleh_app
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      PROJECT_NAME: "Aneleh Commerce API"
      API_VERSION: "0.1.0"
      API_PREFIX: "/api/v1"
      ENVIRONMENT: test
      MYSQL_DATABASE: aneleh_commerce_test
      MYSQL_USER: aneleh_app
      MYSQL_PASSWORD: aneleh_app
      MYSQL_ROOT_PASSWORD: root
      DATABASE_URL: mysql+pymysql://aneleh_app:aneleh_app@localhost:3306/aneleh_commerce_test
      TEST_DATABASE_URL: mysql+pymysql://aneleh_app:aneleh_app@localhost:3306/aneleh_commerce_test
      REDIS_URL: redis://localhost:6379/0
      RABBITMQ_URL: amqp://guest:guest@localhost:5672//
      JWT_SECRET_KEY: ci-only-secret-key-not-for-real-use-00000000
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_SECONDS: 3600
      RATE_LIMIT_PER_MINUTE: 60
      CORS_ORIGINS: "*"

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Checar formatação (Black)
        run: black --check app tests

      - name: Rodar lint (Flake8)
        run: flake8 app tests
      
      - name: Rodar testes
        run: pytest
